name: 결정고시 일일 수집

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 UTC 00:00 (KST 09:00)
  workflow_dispatch:
    inputs:
      backfill:
        description: '과거 미발행 고시문 백필 발행'
        type: boolean
        default: false
      count:
        description: '백필 시 발행 건수'
        type: number
        default: 10

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch new gosi data
        run: python fetch_daily.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data"
          else
            COUNT=$(git diff --staged --stat | grep -c '.json')
            git commit -m "data: 고시문 업데이트 (${COUNT}개 파일 변경)"
            git push
          fi

      - name: Install poppler and Korean fonts
        if: env.WP_URL != ''
        run: sudo apt-get update && sudo apt-get install -y poppler-utils fonts-noto-cjk

      - name: Install Python dependencies for publishing
        if: env.WP_URL != ''
        run: pip install pdf2image Pillow
        env:
          WP_URL: ${{ secrets.WP_URL }}

      - name: Publish to WordPress
        if: env.WP_URL != ''
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python publish_daily.py --backfill --count ${{ github.event.inputs.count || 10 }}
          else
            python publish_daily.py
          fi

      - name: Commit published records
        if: env.WP_URL != ''
        env:
          WP_URL: ${{ secrets.WP_URL }}
        run: |
          git add data/wp_published.json || true
          git diff --staged --quiet || git commit -m "data: WP 발행 기록 업데이트"
          git push || true
